services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: autoresearch
      POSTGRES_PASSWORD: autoresearch
      POSTGRES_DB: autoresearch
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoresearch -d autoresearch"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ar_pg_data:/var/lib/postgresql/data

  migrate:
    build: .
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      AR_DATABASE_URL: postgresql+psycopg2://autoresearch:autoresearch@postgres:5432/autoresearch
      AR_REDIS_URL: redis://redis:6379/0
      AR_DATA_DIR: /data
      AR_WORKTREE_ROOT: /data/worktrees
      AR_SECRET_KEY: ${AR_SECRET_KEY}
      AR_LLM_PROVIDER: ${AR_LLM_PROVIDER:-anthropic}
      AR_ANTHROPIC_API_KEY: ${AR_ANTHROPIC_API_KEY:-}
      AR_OPENAI_API_KEY: ${AR_OPENAI_API_KEY:-}
    volumes:
      - ar_data:/data
    command: ["alembic", "upgrade", "head"]

  api:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      AR_DATABASE_URL: postgresql+psycopg2://autoresearch:autoresearch@postgres:5432/autoresearch
      AR_REDIS_URL: redis://redis:6379/0
      AR_DATA_DIR: /data
      AR_WORKTREE_ROOT: /data/worktrees
      AR_SECRET_KEY: ${AR_SECRET_KEY}
      AR_LLM_PROVIDER: ${AR_LLM_PROVIDER:-anthropic}
      AR_ANTHROPIC_API_KEY: ${AR_ANTHROPIC_API_KEY:-}
      AR_OPENAI_API_KEY: ${AR_OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ar_data:/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]

  worker:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      AR_DATABASE_URL: postgresql+psycopg2://autoresearch:autoresearch@postgres:5432/autoresearch
      AR_REDIS_URL: redis://redis:6379/0
      AR_DATA_DIR: /data
      AR_WORKTREE_ROOT: /data/worktrees
      AR_SECRET_KEY: ${AR_SECRET_KEY}
      AR_LLM_PROVIDER: ${AR_LLM_PROVIDER:-anthropic}
      AR_ANTHROPIC_API_KEY: ${AR_ANTHROPIC_API_KEY:-}
      AR_OPENAI_API_KEY: ${AR_OPENAI_API_KEY:-}
    volumes:
      - ar_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info", "--concurrency=2"]

  beat:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      AR_DATABASE_URL: postgresql+psycopg2://autoresearch:autoresearch@postgres:5432/autoresearch
      AR_REDIS_URL: redis://redis:6379/0
      AR_DATA_DIR: /data
      AR_WORKTREE_ROOT: /data/worktrees
      AR_SECRET_KEY: ${AR_SECRET_KEY}
      AR_LLM_PROVIDER: ${AR_LLM_PROVIDER:-anthropic}
      AR_ANTHROPIC_API_KEY: ${AR_ANTHROPIC_API_KEY:-}
      AR_OPENAI_API_KEY: ${AR_OPENAI_API_KEY:-}
    volumes:
      - ar_data:/data
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=info"]

volumes:
  ar_data:
  ar_pg_data:
